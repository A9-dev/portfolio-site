<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Test artefacts placeholder</title>
  <desc id="desc">Template file explorer and verification output for generated certificate artefacts.</desc>
  <rect width="1600" height="900" fill="#f5f5f4" rx="32" />
  <rect x="120" y="120" width="500" height="660" rx="28" fill="#ffffff" stroke="#d6d3d1" stroke-width="4" />
  <text x="170" y="190" fill="#18181b" font-family="Nunito Sans, sans-serif" font-size="40" font-weight="700">issue-cert-test/</text>
  <g font-family="monospace" font-size="28" fill="#44403c">
    <text x="170" y="270">client.key</text>
    <text x="170" y="320">client.csr</text>
    <text x="170" y="370">request.json</text>
    <text x="170" y="420">response.json</text>
    <text x="170" y="470">issued.crt</text>
    <text x="170" y="520">verification.txt</text>
  </g>
  <rect x="710" y="120" width="770" height="660" rx="28" fill="#18181b" />
  <text x="770" y="190" fill="#fafaf9" font-family="monospace" font-size="30">openssl verify -CAfile root-ca.crt issued.crt</text>
  <g font-family="monospace" font-size="28">
    <text x="770" y="290" fill="#4ade80">issued.crt: OK</text>
    <text x="770" y="370" fill="#f4f4f5">subject=CN = service.internal</text>
    <text x="770" y="430" fill="#f4f4f5">issuer=CN = Demo Root CA</text>
    <text x="770" y="490" fill="#f4f4f5">notAfter=May 08 05:39:10 2026 GMT</text>
    <text x="770" y="590" fill="#38bdf8">Generated as template placeholder for the portfolio page.</text>
  </g>
</svg>