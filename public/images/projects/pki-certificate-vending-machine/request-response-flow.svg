<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Request response flow placeholder</title>
  <desc id="desc">Template sequence diagram for the certificate issuance flow.</desc>
  <rect width="1600" height="900" fill="#fafaf9" rx="32" />
  <text x="120" y="120" fill="#18181b" font-family="Nunito Sans, sans-serif" font-size="54" font-weight="700">Certificate issuance flow</text>
  <g font-family="Nunito Sans, sans-serif">
    <text x="220" y="220" text-anchor="middle" fill="#334155" font-size="32" font-weight="700">Client</text>
    <text x="620" y="220" text-anchor="middle" fill="#334155" font-size="32" font-weight="700">API Gateway</text>
    <text x="1020" y="220" text-anchor="middle" fill="#334155" font-size="32" font-weight="700">Lambda</text>
    <text x="1380" y="220" text-anchor="middle" fill="#334155" font-size="32" font-weight="700">Secrets</text>
  </g>
  <g stroke="#cbd5e1" stroke-width="4" stroke-dasharray="10 14">
    <path d="M220 250v520" />
    <path d="M620 250v520" />
    <path d="M1020 250v520" />
    <path d="M1380 250v520" />
  </g>
  <g font-family="Nunito Sans, sans-serif" font-size="24" fill="#0f172a">
    <rect x="170" y="300" width="500" height="52" rx="26" fill="#dbeafe" />
    <text x="420" y="333" text-anchor="middle">1. Submit CSR + requested TTL</text>

    <rect x="570" y="400" width="500" height="52" rx="26" fill="#dcfce7" />
    <text x="820" y="433" text-anchor="middle">2. Forward signed IAM-authenticated request</text>

    <rect x="970" y="500" width="460" height="52" rx="26" fill="#ede9fe" />
    <text x="1200" y="533" text-anchor="middle">3. Read CA secret material</text>

    <rect x="570" y="600" width="500" height="52" rx="26" fill="#fef3c7" />
    <text x="820" y="633" text-anchor="middle">4. Validate CSR and issue certificate</text>

    <rect x="170" y="700" width="900" height="52" rx="26" fill="#e0f2fe" />
    <text x="620" y="733" text-anchor="middle">5. Return PEM certificate + expiry timestamp</text>
  </g>
  <g stroke="#2563eb" stroke-width="8" fill="#2563eb" stroke-linecap="round">
    <path d="M300 326h290" />
    <polygon points="590,314 620,326 590,338" />
    <path d="M700 426h290" />
    <polygon points="990,414 1020,426 990,438" />
    <path d="M1080 526h270" />
    <polygon points="1350,514 1380,526 1350,538" />
    <path d="M1020 626H730" />
    <polygon points="730,614 700,626 730,638" />
    <path d="M620 726H300" />
    <polygon points="300,714 270,726 300,738" />
  </g>
</svg>