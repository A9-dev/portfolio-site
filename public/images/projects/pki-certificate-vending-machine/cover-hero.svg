<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PKI issuer cover placeholder</title>
  <desc id="desc">Template hero artwork for a certificate vending machine project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" rx="32" />
  <circle cx="1320" cy="150" r="120" fill="#bfdbfe" opacity="0.55" />
  <circle cx="150" cy="760" r="180" fill="#93c5fd" opacity="0.35" />
  <rect x="120" y="120" width="1360" height="660" rx="36" fill="#ffffff" opacity="0.9" />
  <rect x="180" y="180" width="620" height="540" rx="28" fill="url(#card)" />
  <text x="240" y="290" fill="#dbeafe" font-family="Nunito Sans, sans-serif" font-size="30" letter-spacing="6">PORTFOLIO PROJECT</text>
  <text x="240" y="380" fill="#ffffff" font-family="Nunito Sans, sans-serif" font-size="68" font-weight="700">PKI Issuer</text>
  <text x="240" y="458" fill="#bfdbfe" font-family="Nunito Sans, sans-serif" font-size="34">Certificate vending machine on AWS</text>
  <g fill="#e0f2fe" font-family="Nunito Sans, sans-serif" font-size="28">
    <rect x="240" y="530" width="150" height="48" rx="24" fill="#1e3a8a" />
    <text x="315" y="562" text-anchor="middle">Terraform</text>
    <rect x="408" y="530" width="112" height="48" rx="24" fill="#1e40af" />
    <text x="464" y="562" text-anchor="middle">AWS</text>
    <rect x="538" y="530" width="90" height="48" rx="24" fill="#1d4ed8" />
    <text x="583" y="562" text-anchor="middle">Go</text>
    <rect x="646" y="530" width="98" height="48" rx="24" fill="#2563eb" />
    <text x="695" y="562" text-anchor="middle">PKI</text>
