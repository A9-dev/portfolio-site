    <text x="215" y="327" text-anchor="middle" fill="#ffffff" font-family="Nunito Sans, sans-serif" font-size="28" font-weight="700">Issue Cert</text>
    <path d="M214 366c62 0 112 44 112 98H102c0-54 50-98 112-98z" fill="#93c5fd" />
