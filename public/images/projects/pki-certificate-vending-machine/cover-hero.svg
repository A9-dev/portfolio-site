    <rect x="56" y="58" width="318" height="184" rx="24" fill="#dbeafe" />
    <path d="M120 175h190" stroke="#1d4ed8" stroke-width="18" stroke-linecap="round" />
    <path d="M214 98v154" stroke="#1d4ed8" stroke-width="18" stroke-linecap="round" />
